<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG Evaluation Results</title>
  <style>
    :root {
      --bg: #070b14;
      --panel: #0f1724;
      --panel-2: #131d2d;
      --panel-3: #182338;
      --ink: #eef4ff;
      --muted: #9aa8bd;
      --line: #263247;
      --accent: #5aa2ff;
      --accent-2: #7c3aed;
      --good: #40d39c;
      --warn: #f5c451;
      --bad: #ff7a59;
      --soft: #172b4d;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 0%, rgba(36, 107, 254, 0.18), transparent 28rem),
        radial-gradient(circle at 86% 12%, rgba(124, 58, 237, 0.18), transparent 30rem),
        linear-gradient(180deg, #08111f 0%, var(--bg) 42%);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(9, 15, 27, 0.86);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 88px;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .file-label,
    button,
    select,
    input[type="search"] {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(19, 29, 45, 0.95);
      color: var(--ink);
      font: inherit;
    }

    button:hover,
    select:hover,
    input[type="search"]:hover {
      border-color: #3a4b68;
    }

    button:focus-visible,
    select:focus-visible,
    input[type="search"]:focus-visible,
    .file-label:focus-within {
      outline: 2px solid rgba(90, 162, 255, 0.55);
      outline-offset: 2px;
    }

    .file-label,
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      cursor: pointer;
    }

    .file-label {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-color: transparent;
      color: #fff;
      font-weight: 650;
      box-shadow: 0 10px 28px rgba(90, 162, 255, 0.18);
    }

    input[type="file"] {
      display: none;
    }

    select,
    input[type="search"] {
      padding: 0 10px;
    }

    main {
      padding: 24px 0 40px;
    }

    .empty {
      min-height: 320px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: rgba(15, 23, 36, 0.82);
      color: var(--muted);
      text-align: center;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .panel {
      grid-column: span 12;
      background: linear-gradient(180deg, rgba(19, 29, 45, 0.96), rgba(15, 23, 36, 0.96));
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 35, 56, 0.68);
    }

    h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
      font-weight: 750;
    }

    .panel-body {
      padding: 18px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
    }

    .tile {
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.015)),
        var(--panel-2);
      position: relative;
      overflow: hidden;
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }

    .tile-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
    }

    .tile-value {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 820;
      font-variant-numeric: tabular-nums;
    }

    .tile-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .metric-bar {
      height: 8px;
      margin-top: 12px;
      border-radius: 999px;
      background: rgba(154, 168, 189, 0.16);
      overflow: hidden;
    }

    .metric-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--good));
      width: 0%;
    }

    .score-good {
      color: var(--good);
    }

    .score-warn {
      color: var(--warn);
    }

    .score-bad {
      color: var(--bad);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: rgba(24, 35, 56, 0.92);
      color: #c7d2e5;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    tr:hover td {
      background: rgba(90, 162, 255, 0.06);
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .qid {
      font-weight: 700;
      white-space: nowrap;
    }

    .query {
      min-width: 240px;
      max-width: 420px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--soft);
      color: #b9d7ff;
      border: 1px solid rgba(90, 162, 255, 0.24);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .answer {
      max-width: 560px;
      white-space: pre-wrap;
    }

    .qa-row td {
      padding-top: 0;
      background: rgba(6, 10, 18, 0.28);
    }

    .qa-compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px 0 4px;
    }

    .qa-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(15, 23, 36, 0.72);
      overflow: hidden;
    }

    .qa-card h3 {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 35, 56, 0.72);
      color: #dbe7f8;
      font-size: 13px;
      letter-spacing: 0;
    }

    .qa-card div {
      max-height: 220px;
      overflow: auto;
      padding: 12px;
      color: #d7e2f2;
      white-space: pre-wrap;
    }

    .details {
      margin-top: 8px;
    }

    .details summary {
      cursor: pointer;
      color: var(--accent);
      font-weight: 650;
    }

    .details pre {
      max-height: 240px;
      overflow: auto;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #060a12;
      color: #e5e7eb;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .compare-up {
      color: var(--good);
    }

    .compare-down {
      color: var(--bad);
    }

    .compare-flat {
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }

      .controls {
        justify-content: flex-start;
      }

      .meta,
      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      table {
        min-width: 820px;
      }

      .qa-compare {
        grid-template-columns: 1fr;
      }

      .table-scroll {
        overflow-x: auto;
      }
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 20px, 1180px);
      }

      .meta,
      .metric-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>RAG Evaluation Results</h1>
        <p class="subtitle">載入 retrieval 或 RAGAS JSON 結果檔，檢視 summary、逐題分數與版本差異。</p>
      </div>
      <div class="controls">
        <select id="builtInSelect" aria-label="Built-in result file"></select>
        <button id="loadBuiltInButton" type="button">加入</button>
        <label class="file-label">
          手動載入 JSON
          <input id="fileInput" type="file" accept="application/json,.json" multiple>
        </label>
        <select id="primarySelect" aria-label="Primary result"></select>
        <select id="compareSelect" aria-label="Compare result"></select>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="empty" class="empty">
      <div>
        <strong>選擇 eval/results 內的 JSON 檔案開始檢視。</strong>
        <div>可一次選取多個檔案進行版本比較。</div>
      </div>
    </div>

    <div id="content" class="grid" hidden>
      <section class="panel">
        <div class="panel-head">
          <h2>Run Summary</h2>
          <div class="toolbar">
            <input id="searchInput" type="search" placeholder="搜尋 qid 或 query">
            <select id="routeFilter" aria-label="Route filter">
              <option value="">全部 route</option>
            </select>
            <select id="sortSelect" aria-label="Sort rows">
              <option value="qid">依 qid</option>
              <option value="lowest">最低分優先</option>
              <option value="highest">最高分優先</option>
            </select>
          </div>
        </div>
        <div class="panel-body">
          <div id="meta" class="meta"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Metrics</h2>
          <span id="compareBadge" class="badge"></span>
        </div>
        <div class="panel-body">
          <div id="metrics" class="metric-grid"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Lowest Scoring Items</h2>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>QID</th>
                <th>Route</th>
                <th>Query</th>
                <th class="num">Lowest</th>
                <th>Metric</th>
              </tr>
            </thead>
            <tbody id="lowestBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>Per-Query Results</h2>
        </div>
        <div class="table-scroll">
          <table>
            <thead id="rowsHead"></thead>
            <tbody id="rowsBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const BUILT_IN_RESULTS = [
      "ragas_eval_queries_realistic_20260430_225212.json",
      "ragas_eval_queries_realistic_20260430_161834.json",
      "ragas_eval_queries_realistic_20260430_213029.json",
      "retrieval_eval_20260430_001524.json",
      "retrieval_eval_queries_realistic_20260430_150859.json",
    ];

    const state = {
      files: [],
      primaryIndex: 0,
      compareIndex: -1,
    };

    const els = {
      fileInput: document.getElementById("fileInput"),
      builtInSelect: document.getElementById("builtInSelect"),
      loadBuiltInButton: document.getElementById("loadBuiltInButton"),
      primarySelect: document.getElementById("primarySelect"),
      compareSelect: document.getElementById("compareSelect"),
      empty: document.getElementById("empty"),
      content: document.getElementById("content"),
      meta: document.getElementById("meta"),
      metrics: document.getElementById("metrics"),
      compareBadge: document.getElementById("compareBadge"),
      lowestBody: document.getElementById("lowestBody"),
      rowsHead: document.getElementById("rowsHead"),
      rowsBody: document.getElementById("rowsBody"),
      searchInput: document.getElementById("searchInput"),
      routeFilter: document.getElementById("routeFilter"),
      sortSelect: document.getElementById("sortSelect"),
    };

    initBuiltInSelect();

    els.loadBuiltInButton.addEventListener("click", async () => {
      const name = els.builtInSelect.value;
      if (!name) return;
      const loaded = await fetchBuiltInResult(name);
      if (!loaded) return;

      const existingIndex = state.files.findIndex((file) => file.name === loaded.name);
      if (existingIndex >= 0) {
        state.primaryIndex = existingIndex;
      } else {
        state.files.push(loaded);
        state.primaryIndex = state.files.length - 1;
        if (state.compareIndex < 0 && state.files.length > 1) {
          state.compareIndex = 0;
        }
      }

      updateSelectors();
      render();
    });

    els.fileInput.addEventListener("change", async (event) => {
      const files = Array.from(event.target.files || []);
      const loaded = await Promise.all(files.map(readResultFile));
      state.files = loaded.filter(Boolean);
      state.primaryIndex = 0;
      state.compareIndex = state.files.length > 1 ? 1 : -1;
      updateSelectors();
      render();
    });

    els.primarySelect.addEventListener("change", () => {
      state.primaryIndex = Number(els.primarySelect.value);
      render();
    });

    els.compareSelect.addEventListener("change", () => {
      state.compareIndex = Number(els.compareSelect.value);
      render();
    });

    els.searchInput.addEventListener("input", render);
    els.routeFilter.addEventListener("change", render);
    els.sortSelect.addEventListener("change", render);

    function initBuiltInSelect() {
      els.builtInSelect.innerHTML = '<option value="">選取 eval/results JSON</option>';
      BUILT_IN_RESULTS.forEach((name) => {
        els.builtInSelect.appendChild(new Option(name, name));
      });
    }

    async function fetchBuiltInResult(name) {
      try {
        const response = await fetch(`results/${encodeURIComponent(name)}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        return { name, data };
      } catch (error) {
        alert(
          `無法直接載入 ${name}。\n\n` +
          `如果你是用 file:// 開啟此頁，瀏覽器可能會阻擋讀取本機 JSON。\n` +
          `請改用「手動載入 JSON」，或在專案根目錄執行簡單靜態伺服器後再開啟此頁。\n\n` +
          `錯誤：${error.message}`
        );
        return null;
      }
    }

    async function readResultFile(file) {
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        return { name: file.name, data };
      } catch (error) {
        alert(`無法讀取 ${file.name}: ${error.message}`);
        return null;
      }
    }

    function updateSelectors() {
      els.primarySelect.innerHTML = "";
      els.compareSelect.innerHTML = '<option value="-1">不比較</option>';

      state.files.forEach((file, index) => {
        const primaryOption = new Option(file.name, String(index));
        const compareOption = new Option(file.name, String(index));
        els.primarySelect.appendChild(primaryOption);
        els.compareSelect.appendChild(compareOption);
      });

      els.primarySelect.value = String(state.primaryIndex);
      els.compareSelect.value = String(state.compareIndex);
    }

    function render() {
      const primary = state.files[state.primaryIndex];
      const compare = state.compareIndex >= 0 ? state.files[state.compareIndex] : null;

      els.empty.hidden = Boolean(primary);
      els.content.hidden = !primary;
      if (!primary) return;

      renderRouteFilter(primary.data);
      renderMeta(primary);
      renderMetrics(primary.data, compare?.data);
      renderLowest(primary.data);
      renderRows(primary.data, compare?.data);
    }

    function renderRouteFilter(data) {
      const current = els.routeFilter.value;
      const routes = Array.from(new Set((data.results || []).map((row) => row.route_mode).filter(Boolean))).sort();
      els.routeFilter.innerHTML = '<option value="">全部 route</option>';
      routes.forEach((route) => els.routeFilter.appendChild(new Option(route, route)));
      els.routeFilter.value = routes.includes(current) ? current : "";
    }

    function renderMeta(file) {
      const data = file.data;
      const config = data.config || {};
      const summary = data.summary || {};
      const items = [
        ["檔案", file.name],
        ["建立時間", data.created_at || "-"],
        ["Queries", config.queries_path || "-"],
        ["Total", summary.total ?? (data.results || []).length],
        ["Model", config.answer_model || config.embedding_model || "-"],
        ["Top K", config.top_k ?? "-"],
        ["Collection", config.collection_name || "-"],
        ["Generate only", String(Boolean(config.generate_only))],
      ];

      els.meta.innerHTML = items.map(([label, value]) => `
        <div class="tile">
          <div class="tile-label">${escapeHtml(label)}</div>
          <div class="tile-note">${escapeHtml(String(value))}</div>
        </div>
      `).join("");
    }

    function renderMetrics(data, compareData) {
      const metrics = getSummaryMetrics(data);
      const compareMetrics = compareData ? getSummaryMetrics(compareData) : {};
      const names = Object.keys(metrics);
      els.compareBadge.textContent = compareData ? "比較模式" : "單檔模式";

      els.metrics.innerHTML = names.map((name) => {
        const value = metrics[name];
        const compareValue = compareMetrics[name];
        const delta = typeof compareValue === "number" && typeof value === "number"
          ? value - compareValue
          : null;
        return `
          <div class="tile">
            <div class="tile-label">${escapeHtml(formatMetricName(name))}</div>
            <div class="tile-value ${scoreClass(value)}">${formatNumber(value)}</div>
            <div class="metric-bar">
              <div class="metric-fill" style="width: ${metricPercent(value)}%"></div>
            </div>
            <div class="tile-note">${formatDelta(delta)}</div>
          </div>
        `;
      }).join("");
    }

    function renderLowest(data) {
      const metricNames = getMetricNames(data);
      const rows = filteredRows(data).map((row) => {
        const scores = row.ragas_scores || {};
        let lowestMetric = "";
        let lowestValue = Infinity;
        metricNames.forEach((metric) => {
          const value = scores[metric];
          if (typeof value === "number" && value < lowestValue) {
            lowestValue = value;
            lowestMetric = metric;
          }
        });
        return { row, lowestMetric, lowestValue };
      }).filter((item) => Number.isFinite(item.lowestValue))
        .sort((a, b) => a.lowestValue - b.lowestValue)
        .slice(0, 8);

      els.lowestBody.innerHTML = rows.map(({ row, lowestMetric, lowestValue }) => `
        <tr>
          <td class="qid">${escapeHtml(row.qid || "")}</td>
          <td>${badge(row.route_mode || "-")}</td>
          <td class="query">${escapeHtml(row.query || "")}</td>
          <td class="num ${scoreClass(lowestValue)}">${formatNumber(lowestValue)}</td>
          <td>${escapeHtml(formatMetricName(lowestMetric))}</td>
        </tr>
      `).join("");
    }

    function renderRows(data, compareData) {
      const metricNames = getMetricNames(data);
      const isRagas = metricNames.length > 0;
      const compareByQid = new Map((compareData?.results || []).map((row) => [row.qid, row]));

      els.rowsHead.innerHTML = isRagas
        ? `<tr>
            <th>QID</th>
            <th>Route</th>
            <th>Query</th>
            ${metricNames.map((name) => `<th class="num">${escapeHtml(formatMetricName(name))}</th>`).join("")}
            <th>Answer</th>
          </tr>`
        : `<tr>
            <th>QID</th>
            <th>Query</th>
            <th class="num">Hit</th>
            <th class="num">Rank</th>
            <th class="num">RR</th>
            <th>Retrieved</th>
          </tr>`;

      let rows = filteredRows(data);
      rows = sortRows(rows, isRagas ? metricNames : []);

      els.rowsBody.innerHTML = rows.map((row) => {
        if (isRagas) {
          const compareRow = compareByQid.get(row.qid);
          return `
            <tr>
              <td class="qid">${escapeHtml(row.qid || "")}</td>
              <td>${badge(row.route_mode || "-")}</td>
              <td class="query">${escapeHtml(row.query || "")}</td>
              ${metricNames.map((name) => metricCell(row, compareRow, name)).join("")}
              <td class="answer">
                ${details("contexts", row.contexts || [])}
              </td>
            </tr>
            <tr class="qa-row">
              <td colspan="${metricNames.length + 4}">
                <div class="qa-compare">
                  <section class="qa-card">
                    <h3>Model Answer</h3>
                    <div>${escapeHtml(row.answer || "")}</div>
                  </section>
                  <section class="qa-card">
                    <h3>Ground Truth</h3>
                    <div>${escapeHtml(row.ground_truth || row.reference || "")}</div>
                  </section>
                </div>
              </td>
            </tr>
          `;
        }

        return `
          <tr>
            <td class="qid">${escapeHtml(row.qid || "")}</td>
            <td class="query">${escapeHtml(row.query || "")}</td>
            <td class="num">${row.hit ? "yes" : "no"}</td>
            <td class="num">${row.match_rank ?? "-"}</td>
            <td class="num">${formatNumber(row.reciprocal_rank)}</td>
            <td>${(row.retrieved || []).slice(0, 5).map((item) => badge(`${item.rank}. ${item.doc_id}`)).join(" ")}</td>
          </tr>
        `;
      }).join("");
    }

    function filteredRows(data) {
      const query = els.searchInput.value.trim().toLowerCase();
      const route = els.routeFilter.value;
      return (data.results || []).filter((row) => {
        const matchesRoute = !route || row.route_mode === route;
        const text = `${row.qid || ""} ${row.query || ""}`.toLowerCase();
        const matchesQuery = !query || text.includes(query);
        return matchesRoute && matchesQuery;
      });
    }

    function sortRows(rows, metricNames) {
      const mode = els.sortSelect.value;
      if (mode === "qid") {
        return rows.slice().sort((a, b) => String(a.qid).localeCompare(String(b.qid)));
      }

      if (!metricNames.length) {
        return rows.slice().sort((a, b) => {
          const aRank = a.match_rank ?? 999;
          const bRank = b.match_rank ?? 999;
          return mode === "lowest" ? bRank - aRank : aRank - bRank;
        });
      }

      return rows.slice().sort((a, b) => {
        const aValue = lowestScore(a, metricNames);
        const bValue = lowestScore(b, metricNames);
        return mode === "lowest" ? aValue - bValue : bValue - aValue;
      });
    }

    function metricCell(row, compareRow, name) {
      const value = row.ragas_scores?.[name];
      const compareValue = compareRow?.ragas_scores?.[name];
      const delta = typeof value === "number" && typeof compareValue === "number"
        ? value - compareValue
        : null;
      return `
        <td class="num">
          <span class="${scoreClass(value)}">${formatNumber(value)}</span>
          <div class="tile-note">${formatDelta(delta)}</div>
        </td>
      `;
    }

    function getSummaryMetrics(data) {
      const summary = data.summary || {};
      if (summary.ragas && Object.keys(summary.ragas).length) return summary.ragas;
      return Object.fromEntries(Object.entries(summary).filter(([, value]) => typeof value === "number"));
    }

    function getMetricNames(data) {
      const first = (data.results || []).find((row) => row.ragas_scores);
      return first ? Object.keys(first.ragas_scores || {}) : [];
    }

    function lowestScore(row, metricNames) {
      const values = metricNames.map((name) => row.ragas_scores?.[name]).filter((value) => typeof value === "number");
      return values.length ? Math.min(...values) : Infinity;
    }

    function formatMetricName(name) {
      return String(name || "").replaceAll("_", " ");
    }

    function formatNumber(value) {
      return typeof value === "number" && Number.isFinite(value) ? value.toFixed(3) : "-";
    }

    function metricPercent(value) {
      if (typeof value !== "number" || !Number.isFinite(value)) return 0;
      return Math.max(0, Math.min(100, value * 100));
    }

    function formatDelta(delta) {
      if (delta === null || !Number.isFinite(delta)) return "";
      const cls = delta > 0 ? "compare-up" : delta < 0 ? "compare-down" : "compare-flat";
      const sign = delta > 0 ? "+" : "";
      return `<span class="${cls}">${sign}${delta.toFixed(3)}</span>`;
    }

    function scoreClass(value) {
      if (typeof value !== "number") return "";
      if (value >= 0.8) return "score-good";
      if (value >= 0.6) return "score-warn";
      return "score-bad";
    }

    function badge(text) {
      return `<span class="badge">${escapeHtml(String(text))}</span>`;
    }

    function details(title, value) {
      if (!value || !value.length) return "";
      return `
        <details class="details">
          <summary>${escapeHtml(title)}</summary>
          <pre>${escapeHtml(JSON.stringify(value, null, 2))}</pre>
        </details>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
